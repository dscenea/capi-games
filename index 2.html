<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Capi Games</title>
<link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
:root{--yellow:#FFD93D;--orange:#FF6B35;--purple:#6C63FF;--green:#06D6A0;--pink:#FF6B9D;--blue:#4CC9F0;--dark:#1A1A2E;}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Nunito',sans-serif;background:var(--dark);min-height:100vh;overflow-x:hidden;}
body::before{content:'';position:fixed;inset:0;
  background:radial-gradient(circle at 10% 20%,rgba(108,99,255,.25) 0%,transparent 40%),
             radial-gradient(circle at 90% 80%,rgba(255,107,53,.2) 0%,transparent 40%),
             radial-gradient(circle at 50% 50%,rgba(6,214,160,.1) 0%,transparent 60%);
  pointer-events:none;z-index:0;}

header{position:relative;z-index:1;text-align:center;padding:36px 20px 20px;}
.logo{font-family:'Fredoka One',cursive;font-size:clamp(2.8rem,9vw,5.5rem);
  background:linear-gradient(135deg,var(--yellow) 0%,var(--orange) 40%,var(--pink) 100%);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  animation:logoPulse 3s ease-in-out infinite;letter-spacing:2px;}
@keyframes logoPulse{0%,100%{filter:drop-shadow(0 4px 12px rgba(255,107,53,.4))}50%{filter:drop-shadow(0 4px 24px rgba(255,107,53,.8))}}
.tagline{color:rgba(255,255,255,.5);font-size:.9rem;font-weight:600;letter-spacing:3px;text-transform:uppercase;margin-top:4px;}

/* SCORE BAR */
.score-bar{position:relative;z-index:1;display:flex;justify-content:center;gap:12px;padding:0 20px 14px;flex-wrap:wrap;}
.score-pill{background:rgba(255,255,255,.08);border:2px solid rgba(255,255,255,.15);border-radius:50px;
  padding:7px 18px;color:white;font-weight:800;font-size:.9rem;display:flex;align-items:center;gap:8px;}
.score-pill.active-player{border-color:var(--yellow);box-shadow:0 0 12px rgba(255,217,61,.4);}
.dot{width:10px;height:10px;border-radius:50%;}

/* ── NAV: 3 main modes ── */
.main-nav{position:relative;z-index:1;display:flex;justify-content:center;gap:12px;padding:0 20px 8px;flex-wrap:wrap;}
.nav-btn{font-family:'Fredoka One',cursive;font-size:1.05rem;padding:13px 28px;border-radius:50px;border:none;
  cursor:pointer;color:rgba(255,255,255,.55);background:rgba(255,255,255,.07);
  border:2px solid rgba(255,255,255,.15);transition:all .25s;letter-spacing:.3px;}
.nav-btn:hover{color:white;border-color:rgba(255,255,255,.35);}
.nav-btn.active{color:var(--dark);border-color:transparent;box-shadow:0 6px 22px rgba(0,0,0,.35);}
.nav-adivina.active{background:linear-gradient(135deg,#06D6A0,#4CC9F0);}
.nav-ruleta.active{background:linear-gradient(135deg,var(--orange),var(--yellow));}
.nav-peli.active{background:linear-gradient(135deg,var(--purple),var(--pink));}

/* ── SPORT DROPDOWN ── */
.sport-bar{position:relative;z-index:1;display:flex;justify-content:center;gap:10px;padding:10px 20px 20px;flex-wrap:wrap;}
.sport-btn{font-family:'Fredoka One',cursive;font-size:.97rem;padding:10px 24px;border-radius:50px;border:none;
  cursor:pointer;color:rgba(255,255,255,.5);background:rgba(255,255,255,.07);
  border:2px solid rgba(255,255,255,.15);transition:all .25s;}
.sport-btn:hover{color:white;}
.sport-btn.active{color:var(--dark);border-color:transparent;box-shadow:0 4px 16px rgba(0,0,0,.3);}
.sport-futbol.active{background:linear-gradient(135deg,#06D6A0,#4CC9F0);}
.sport-basket.active{background:linear-gradient(135deg,#FF6B35,#FFD93D);}

/* ── GAME CARD ── */
.game-area{position:relative;z-index:1;max-width:700px;margin:0 auto;padding:0 20px 60px;}
.game-card{background:rgba(255,255,255,.06);border:2px solid rgba(255,255,255,.12);border-radius:28px;
  padding:28px;backdrop-filter:blur(10px);animation:cardIn .4s cubic-bezier(.34,1.56,.64,1);}
@keyframes cardIn{from{opacity:0;transform:translateY(20px) scale(.95)}to{opacity:1;transform:translateY(0) scale(1)}}

/* ── RULETA ── */
.ruleta-wrap{text-align:center;}
.ruleta-title{font-family:'Fredoka One',cursive;font-size:1.5rem;color:white;margin-bottom:6px;}
.ruleta-sub{color:rgba(255,255,255,.45);font-size:.85rem;margin-bottom:22px;}
.slot-machine{display:flex;justify-content:center;margin-bottom:24px;}
.slot{width:200px;height:200px;border-radius:28px;overflow:hidden;position:relative;
  border:3px solid rgba(255,255,255,.15);background:rgba(0,0,0,.3);transition:border-color .3s,box-shadow .3s;}
.slot.stopped{border-color:var(--yellow);box-shadow:0 0 28px rgba(255,217,61,.6);}
.slot-inner{position:absolute;top:0;left:0;width:100%;}
.slot-item{width:200px;height:200px;display:flex;flex-direction:column;align-items:center;
  justify-content:center;gap:10px;padding:12px;}
.slot-emoji{font-size:5rem;line-height:1;}
.slot-label{font-family:'Fredoka One',cursive;font-size:1rem;color:white;text-align:center;
  line-height:1.3;text-shadow:0 1px 4px rgba(0,0,0,.9);}
.spin-btn{font-family:'Fredoka One',cursive;font-size:1.3rem;padding:16px 48px;border:none;
  border-radius:18px;cursor:pointer;background:linear-gradient(135deg,var(--orange),var(--yellow));
  color:var(--dark);box-shadow:0 8px 24px rgba(255,107,53,.4);transition:all .2s cubic-bezier(.34,1.56,.64,1);margin-bottom:18px;}
.spin-btn:hover:not(:disabled){transform:scale(1.06);}
.spin-btn:disabled{opacity:.5;cursor:not-allowed;}
.ruleta-result{background:rgba(255,255,255,.07);border:2px solid rgba(255,255,255,.15);
  border-radius:18px;padding:18px 22px;margin-top:16px;display:none;}
.ruleta-result.show{display:block;animation:cardIn .35s cubic-bezier(.34,1.56,.64,1);}
.result-title{font-family:'Fredoka One',cursive;color:var(--yellow);font-size:1.1rem;margin-bottom:10px;}
.result-chip{background:rgba(255,255,255,.1);border-radius:12px;padding:10px 20px;
  color:white;font-weight:700;font-size:1rem;display:inline-flex;align-items:center;gap:10px;}
.result-chip .re{font-size:1.8rem;}

/* ── ADIVINA ── */
.game-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:22px;flex-wrap:wrap;gap:10px;}
.game-title{font-family:'Fredoka One',cursive;font-size:1.5rem;color:white;}
.hint-counter{font-weight:800;font-size:.82rem;padding:5px 12px;border-radius:50px;}
.hints-container{display:flex;flex-direction:column;gap:9px;margin-bottom:24px;min-height:200px;}
.hint-card{background:rgba(255,255,255,.08);border-radius:13px;padding:12px 16px;color:white;
  font-weight:600;font-size:.92rem;display:flex;align-items:center;gap:11px;
  animation:hintSlide .4s cubic-bezier(.34,1.56,.64,1);border-left:4px solid transparent;}
@keyframes hintSlide{from{opacity:0;transform:translateX(-16px)}to{opacity:1;transform:translateX(0)}}
.hint-num{font-family:'Fredoka One',cursive;font-size:1.1rem;min-width:26px;text-align:center;}
.hint-locked{opacity:.22;filter:blur(6px);user-select:none;}
.answer-section{display:flex;gap:10px;}
.answer-input{flex:1;background:rgba(255,255,255,.1);border:2px solid rgba(255,255,255,.2);
  border-radius:13px;padding:13px 16px;color:white;font-family:'Nunito',sans-serif;
  font-size:.97rem;font-weight:700;outline:none;transition:border-color .2s;}
.answer-input::placeholder{color:rgba(255,255,255,.3);}
.answer-input:focus{border-color:rgba(255,255,255,.5);}
.btn{font-family:'Fredoka One',cursive;font-size:.97rem;padding:13px 20px;border:none;
  border-radius:13px;cursor:pointer;transition:all .2s cubic-bezier(.34,1.56,.64,1);}
.btn:hover{transform:scale(1.05);}
.btn:active{transform:scale(.97);}
.btn-check{background:var(--green);color:var(--dark);}
.btn-hint{background:var(--yellow);color:var(--dark);}
.btn-pass{background:rgba(255,255,255,.12);color:white;border:2px solid rgba(255,255,255,.2);}
.btn-row{display:flex;gap:10px;margin-top:10px;}
.btn-next{background:linear-gradient(135deg,var(--purple),var(--pink));color:white;
  width:100%;padding:15px;font-size:1.05rem;border-radius:15px;margin-top:14px;}
.feedback{text-align:center;padding:14px;border-radius:15px;font-family:'Fredoka One',cursive;
  font-size:1.3rem;margin-top:14px;animation:pop .3s cubic-bezier(.34,1.56,.64,1);}
@keyframes pop{from{transform:scale(.8);opacity:0}to{transform:scale(1);opacity:1}}
.feedback.correct{background:rgba(6,214,160,.2);border:2px solid var(--green);color:var(--green);}
.feedback.wrong{background:rgba(255,107,53,.2);border:2px solid var(--orange);color:var(--orange);}

.whose-turn{text-align:center;padding:9px 14px;background:rgba(255,255,255,.07);
  border-radius:12px;margin-bottom:18px;color:white;font-weight:700;font-size:.9rem;}
.whose-turn span{font-family:'Fredoka One',cursive;font-size:1rem;}

/* ── SCOREBOARD ── */
.scoreboard-section{margin-top:28px;padding-top:22px;border-top:1px solid rgba(255,255,255,.1);}
.scoreboard-title{font-family:'Fredoka One',cursive;color:rgba(255,255,255,.4);font-size:.82rem;
  letter-spacing:2px;text-transform:uppercase;text-align:center;margin-bottom:10px;}
.scoreboard-rows{display:flex;flex-direction:column;gap:7px;}
.sb-row{display:flex;align-items:center;justify-content:space-between;
  background:rgba(255,255,255,.05);border-radius:11px;padding:9px 14px;}
.sb-name{color:white;font-weight:800;}
.sb-pts{font-family:'Fredoka One',cursive;font-size:1.05rem;}
.add-player-row{display:flex;gap:10px;margin-top:10px;}
.player-input{flex:1;background:rgba(255,255,255,.07);border:2px solid rgba(255,255,255,.14);
  border-radius:11px;padding:9px 13px;color:white;font-family:'Nunito',sans-serif;font-weight:700;outline:none;}
.player-input::placeholder{color:rgba(255,255,255,.3);}
.btn-add{background:var(--blue);color:var(--dark);padding:9px 16px;font-size:.9rem;}

.emoji-float{position:fixed;font-size:2rem;pointer-events:none;z-index:999;animation:floatUp 1.2s ease-out forwards;}
@keyframes floatUp{0%{opacity:1;transform:translateY(0) scale(1)}100%{opacity:0;transform:translateY(-120px) scale(1.5)}}

@media(max-width:480px){
  .game-card{padding:18px;}
  .answer-section{flex-direction:column;}
  .slot{width:160px;height:160px;}
  .slot-item{width:160px;height:160px;}
  .slot-emoji{font-size:3.8rem;}
}
</style>
</head>

function pickQ(){
  const key=S.mode==='peli'?'peli':S.sport;
  const pool=DATA_ADIVINA[key], used=S.usedIndices[key];
  let av=pool.map((_,i)=>i).filter(i=>!used.includes(i));
  if(!av.length){S.usedIndices[key]=[];av=pool.map((_,i)=>i);}
  const p=av[Math.floor(Math.random()*av.length)];
  S.usedIndices[key].push(p); S.questionIndex=p;
}

function renderScoreBar(){
  const b=document.getElementById('scoreBar');
  if(!S.players.length){b.innerHTML='';return;}
  b.innerHTML=S.players.map((p,i)=>`
    <div class="score-pill ${S.currentPlayer===i?'active-player':''}">
      <span class="dot" style="background:${PC[i%PC.length]}"></span>
      ${p.name}: <strong>${p.score} pts</strong>
    </div>`).join('');
}

}

        const oi=S.players.findIndex(x=>x.name===p.name);
        return`<div class="sb-row"><span class="sb-name">${i===0?'🏆':i===1?'🥈':i===2?'🥉':'  '} ${p.name}</span>
          <span class="sb-pts" style="color:${PC[oi%PC.length]}">${p.score} pts</span></div>`;
      }).join('')}</div>`
    :`<p style="color:rgba(255,255,255,.35);text-align:center;font-size:.87rem">Añade jugadores para llevar la puntuación</p>`;
  return`<div class="scoreboard-section">
    <div class="scoreboard-title">Marcador</div>${rows}
    <div class="add-player-row">
      <input class="player-input" id="playerNameInput" placeholder="Nombre del jugador..." onkeydown="if(event.key==='Enter')addPlayer()">
      <button class="btn btn-add" onclick="addPlayer()">+ Añadir</button>
    </div></div>`;
}

function turnHTML(){
  if(!S.players.length)return'';
  const c=curColor();
  return`<div class="whose-turn">Turno de: <span style="color:${c}">${S.players[S.currentPlayer]?.name}</span></div>`;
}

// RULETA
function renderRuleta(){
  const sport=S.sport;
  const desc=sport==='futbol'
    ?'Gira el carrete y piensa un jugador de ese equipo o país.'
    :'Gira el carrete y piensa un jugador de ese equipo o país.';
  const it=S.finalItem;
  const slotHTML=`<div class="slot ${S.finalItem&&!S.spinning?'stopped':''}" id="slot0">
    <div class="slot-inner" id="inner0">
      <div class="slot-item" style="${it&&it.bg?`background:${it.bg}`:''}">
        <span class="slot-emoji">${it?it.emoji:'❓'}</span>
        <span class="slot-label">${it?it.label:'–'}</span>
      </div>
    </div>
  </div>`;
  const resultShown=S.finalItem&&!S.spinning;
  const resultHTML=resultShown?`
    <div class="ruleta-result show">
      <div class="result-title">🎯 Piensa un jugador de…</div>
      <div class="result-chip"><span class="re">${S.finalItem.emoji}</span>${S.finalItem.label.replace('\n',' – ')}</div>
    </div>`:'';
  const nextBtn=resultShown?`<button class="btn btn-next" style="margin-top:14px" onclick="nextTurnRuleta()">Siguiente turno →</button>`:'';
  const emoji=sport==='futbol'?'⚽':'🏀';
  const name=sport==='futbol'?'Fútbol':'Baloncesto';
  document.getElementById('gameCard').innerHTML=`
    <div class="ruleta-wrap">
      <div class="ruleta-title">${emoji} Ruleta de ${name}</div>
      <p class="ruleta-sub">${desc}</p>
      ${turnHTML()}
      <div class="slot-machine">${slotHTML}</div>
      <button class="spin-btn" id="spinBtn" onclick="spinRuleta()" ${S.spinning?'disabled':''}>
        ${S.spinning?'⏳ Girando…':'🎰 ¡Girar!'}
      </button>
      ${resultHTML}${nextBtn}
    </div>${sbHTML()}`;
}

function spinRuleta(){
  if(S.spinning)return;
  S.spinning=true;
  S.finalItem=pickRandom(rItems());
  render();
  const dur=2400;
  const pool=rItems();
  let last=0,elapsed=0;
  function frame(ts){
    if(!last)last=ts;
    elapsed+=ts-last;last=ts;
    const inner=document.getElementById('inner0');
    if(!inner)return;
    if(elapsed>=dur){
      const fin=S.finalItem;
      inner.innerHTML=`<div class="slot-item" style="${fin.bg?`background:${fin.bg}`:''}">
        <span class="slot-emoji">${fin.emoji}</span>
        <span class="slot-label">${fin.label}</span>
      </div>`;
      const slot=document.getElementById('slot0');
      if(slot)slot.classList.add('stopped');
      S.spinning=false;render();return;
    }
    const r=pool[Math.floor(Math.random()*pool.length)];
    inner.innerHTML=`<div class="slot-item" style="${r.bg?`background:${r.bg}`:''}">
      <span class="slot-emoji">${r.emoji}</span>
      <span class="slot-label">${r.label}</span>
    </div>`;
    requestAnimationFrame(frame);
  }
  requestAnimationFrame(frame);
}

function nextTurnRuleta(){
  if(S.players.length)S.currentPlayer=(S.currentPlayer+1)%S.players.length;
  S.finalItem=null;renderScoreBar();render();
}

// ADIVINA
function renderAdivina(){
  const key=S.mode==='peli'?'peli':S.sport;
  const q=DATA_ADIVINA[key][S.questionIndex];
  const c=curColor();const maxH=q.hints.length;
  const emoji=S.mode==='peli'?'🎬':S.sport==='futbol'?'⚽':'🏀';
  const hintsHTML=q.hints.map((h,i)=>{
    const rev=i<S.hintsRevealed;
    return`<div class="hint-card" style="${rev?`border-left-color:${c}`:''}">
      <span class="hint-num" style="color:${c}">${i+1}</span>
      <span${rev?'':' class="hint-locked"'}>${rev?h:'&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;'}</span>
    </div>`;
  }).join('');
  const feedbackHTML=S.feedback?`<div class="feedback ${S.feedback.type}">${S.feedback.msg}</div>`:'';
  const nextBtn=S.answered?`<button class="btn btn-next" onclick="nextTurnAdivina()">Siguiente pregunta →</button>`:'';
  const curPts=Math.max(5-S.hintsRevealed+1,1)*10;
  const inputSection=!S.answered?`
    <div class="answer-section">
      <input class="answer-input" id="answerInput" placeholder="Tu respuesta..." onkeydown="if(event.key==='Enter')checkAnswer()">
      <button class="btn btn-check" onclick="checkAnswer()">✓</button>
    </div>
    <div class="btn-row">
      <button class="btn btn-hint" onclick="revealHint()" ${S.hintsRevealed>=maxH?'disabled style="opacity:.4"':''}>
        💡 Pista (${S.hintsRevealed}/${maxH})
      </button>
      <button class="btn btn-pass" onclick="passTurn()">⏭️ Paso</button>
    </div>
    <p style="text-align:center;color:rgba(255,255,255,.4);font-size:.8rem;margin-top:10px;">
      En juego: <strong style="color:${c}">${curPts} pts</strong> · Fallo: <strong style="color:var(--orange)">-10 pts</strong>
    </p>`:'';
  document.getElementById('gameCard').innerHTML=`
    <div class="game-header">
      <div class="game-title">${emoji} Adivina</div>
      <div class="hint-counter" style="background:${c}22;color:${c};border:2px solid ${c}44">Pista ${Math.min(S.hintsRevealed,maxH)}/${maxH}</div>
    </div>
    ${turnHTML()}
    <div class="hints-container">${hintsHTML}</div>
    ${inputSection}${feedbackHTML}${nextBtn}
    ${sbHTML()}`;
  if(!S.answered){const inp=document.getElementById('answerInput');if(inp)inp.focus();}
}

// ── ACTIONS ───────────────────────────────────────
function setMode(m,btn){
  S.mode=m;S.answered=false;S.feedback=null;S.hintsRevealed=0;S.finalItem=null;
  document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  if(m!=='ruleta')pickQ();
  render();
}

function setSport(sp,btn){
  S.sport=sp;S.answered=false;S.feedback=null;S.hintsRevealed=0;S.finalItem=null;
  document.querySelectorAll('.sport-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  if(S.mode!=='ruleta')pickQ();
  render();
}

function revealHint(){
  const key=S.mode==='peli'?'peli':S.sport;
  if(S.hintsRevealed<DATA_ADIVINA[key][S.questionIndex].hints.length){S.hintsRevealed++;renderAdivina();}
}

function advancePlayer(){
  if(S.players.length)S.currentPlayer=(S.currentPlayer+1)%S.players.length;
}

function passTurn(){
  if(S.answered)return;
  if(!S.players.length){ floatEmoji('⏭️'); return; }
  advancePlayer();
  renderAdivina();renderScoreBar();
}

function checkAnswer(){
  if(S.answered)return;
  const inp=document.getElementById('answerInput');if(!inp)return;
  const ua=inp.value.trim().toLowerCase();if(!ua)return;
  const key=S.mode==='peli'?'peli':S.sport;
  const q=DATA_ADIVINA[key][S.questionIndex];
  const correct=q.answer.toLowerCase();
  const words=correct.split(' ').filter(w=>w.length>2);
  const ok=words.every(w=>ua.includes(w))||ua.includes(correct);
  const maxH=q.hints.length;

  if(ok){
    const pts=Math.max(5-S.hintsRevealed+1,1)*10;
    S.answered=true;
    S.feedback={type:'correct',msg:`✅ ${S.players.length?S.players[S.currentPlayer].name+' acierta! ':'Correcto! '}+${pts} puntos 🎉`};
    if(S.players.length)S.players[S.currentPlayer].score+=pts;
    floatEmoji('🎉');
    renderAdivina();renderScoreBar();
    return;
  }

  // Wrong answer: -10 points (floor 0), pass to next player, same hint level
  if(S.players.length){
    const p=S.players[S.currentPlayer];
    p.score=Math.max(0,p.score-10);
  }
  inp.value='';

  if(S.hintsRevealed>=maxH && S.players.length<=1){
    // No more hints and effectively no rotation possible — reveal answer
    S.answered=true;
    S.feedback={type:'wrong',msg:`❌ Incorrecto, -10 pts. Era: ${q.answer}`};
    floatEmoji('😬');
    renderAdivina();renderScoreBar();
    return;
  }

  S.feedback={type:'wrong',msg:`❌ Incorrecto, -10 pts. ${S.players.length?'Turno de '+S.players[(S.currentPlayer+1)%S.players.length]?.name:''}`};
  floatEmoji('😬');
  advancePlayer();
  renderAdivina();renderScoreBar();
  // clear feedback after a moment so next player sees clean state, but keep hints
  setTimeout(()=>{ S.feedback=null; if(!S.answered) renderAdivina(); }, 1600);
}

function nextTurnAdivina(){
  if(S.players.length)S.currentPlayer=(S.currentPlayer+1)%S.players.length;
  S.answered=false;S.feedback=null;S.hintsRevealed=0;
  pickQ();renderAdivina();renderScoreBar();
}

function addPlayer(){
  const inp=document.getElementById('playerNameInput');if(!inp)return;
  const name=inp.value.trim();
  if(!name||S.players.find(p=>p.name.toLowerCase()===name.toLowerCase()))return;
  S.players.push({name,score:0});inp.value='';renderScoreBar();render();
}

function floatEmoji(e){
  const el=document.createElement('div');el.className='emoji-float';el.textContent=e;
  el.style.left=(Math.random()*80+10)+'vw';el.style.top='60vh';
  document.body.appendChild(el);setTimeout(()=>el.remove(),1300);
}

pickQ();render();
</script>
